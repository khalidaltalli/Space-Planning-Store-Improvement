<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Tasks</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#0f1117; color:#e2e8f0; min-height:100vh; padding:1.5rem; }

  /* ── Header ── */
  .header { position:relative; display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; margin-bottom:2rem; padding:0.5rem 0 1.5rem; border-bottom:0.5px solid rgba(255,255,255,0.08); }
  .header-left img { height:90px; object-fit:contain; }
  .header-center h1 { font-size:24px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .header-center p  { font-size:12px; color:#64748b; margin-top:5px; }
  .header-right { position:absolute; top:0.5rem; right:0; display:flex; align-items:center; gap:10px; }
  .live-badge { display:flex; align-items:center; gap:6px; font-size:11px; color:#a78bfa; background:rgba(167,139,250,0.08); border:0.5px solid rgba(167,139,250,0.25); padding:5px 12px; border-radius:20px; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#a78bfa; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .back-link { font-size:11px; color:#64748b; text-decoration:none; }
  .back-link:hover { color:#94a3b8; }
  @media(max-width:480px){ .header-right{position:static;margin-top:8px;justify-content:center;} .header-left img{height:60px;} }

  /* ── Layout ── */
  main { max-width:700px; margin:0 auto; }
  .panel { background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.07); border-radius:12px; padding:1.25rem 1.5rem; margin-bottom:1.25rem; }
  .panel h3 { color:#f1f5f9; font-size:14px; font-weight:700; margin-bottom:0.75rem; text-transform:uppercase; letter-spacing:0.4px; }

  /* ── Input ── */
  input#newTask { width:100%; padding:12px 14px; background:#0f1117; border:0.5px solid rgba(255,255,255,0.12); border-radius:8px; color:#e2e8f0; font-family:inherit; font-size:15px; }
  input#newTask:focus { outline:none; border-color:rgba(34,211,238,0.4); }
  input#newTask::placeholder { color:#64748b; }

  /* ── Task rows ── */
  .task-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .task-row:last-child { border-bottom:none; }
  .task-row input[type=checkbox] { accent-color:#22d3ee; width:16px; height:16px; cursor:pointer; flex-shrink:0; }
  .task-title { flex:1; font-size:14px; color:#e2e8f0; }
  .task-title.done { color:#475569; text-decoration:line-through; }
  .task-updated { font-size:11px; color:#475569; white-space:nowrap; }
  .empty { font-size:13px; color:#475569; padding:8px 0; }

  /* ── Period buttons ── */
  .period-btns { display:flex; gap:8px; margin-bottom:14px; }
  .period-btns button { background:#262c3d; color:#94a3b8; border:none; padding:7px 16px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
  .period-btns button.active { background:rgba(34,211,238,0.12); color:#22d3ee; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="https://khalidaltalli.github.io/Space-Planning-Store-Improvement/">
      <img src="https://khalidaltalli.github.io/Space-Planning-Store-Improvement/logo.png" alt="Logo">
    </a>
  </div>
  <div class="header-center">
    <h1>My Tasks</h1>
    <p>Private — Space Planning &amp; Store Improvement</p>
  </div>
  <div class="header-right">
    <span class="live-badge"><span class="live-dot"></span>Private</span>
    <a class="back-link" href="https://khalidaltalli.github.io/Space-Planning-Store-Improvement/">&larr; Main Platform</a>
  </div>
</div>

<main>
  <div class="panel">
    <input id="newTask" placeholder="Type a task and press Enter…">
  </div>

  <div class="panel">
    <h3>Open</h3>
    <div id="openTasks"><p class="empty">Loading…</p></div>
  </div>

  <div class="panel">
    <h3>Done</h3>
    <div id="doneTasks"><p class="empty">—</p></div>
  </div>

  <div class="panel">
    <h3>Report</h3>
    <div class="period-btns">
      <button data-period="day" class="active">Today</button>
      <button data-period="week">This Week</button>
      <button data-period="month">This Month</button>
    </div>
    <div id="reportList"><p class="empty">—</p></div>
  </div>
</main>

<script src="api.js"></script>
<script>
let tasks = [];
let currentPeriod = 'day';

function fmt(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch(e) { return d; }
}

function renderRow(t) {
  const done = t.Status === 'Done';
  return `<div class="task-row">
    <input type="checkbox" ${done?'checked':''} data-id="${t.ID}" class="toggleDone">
    <div class="task-title ${done?'done':''}">${t.Title||''}</div>
    <div class="task-updated">${fmt(t.Updated||t.Created)}</div>
  </div>`;
}

function inPeriod(dateStr, period) {
  if (!dateStr) return false;
  const d = new Date(dateStr); if (isNaN(d)) return false;
  const now = new Date();
  if (period === 'day') return d.toDateString() === now.toDateString();
  if (period === 'week') { const w = new Date(now); w.setDate(now.getDate()-7); return d >= w && d <= now; }
  if (period === 'month') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  return false;
}

function render() {
  const open = tasks.filter(t => t.Status !== 'Done').sort((a,b) => new Date(b.Updated||b.Created) - new Date(a.Updated||a.Created));
  const done = tasks.filter(t => t.Status === 'Done').sort((a,b) => new Date(b.Updated||b.Created) - new Date(a.Updated||a.Created));

  document.getElementById('openTasks').innerHTML = open.length ? open.map(renderRow).join('') : '<p class="empty">No open tasks.</p>';
  document.getElementById('doneTasks').innerHTML = done.length ? done.map(renderRow).join('') : '<p class="empty">Nothing done yet.</p>';

  document.querySelectorAll('.toggleDone').forEach(cb => {
    cb.addEventListener('change', async () => {
      await WorkHub.saveRow('My Tasks', { 'Status': cb.checked ? 'Done' : 'Open' }, cb.dataset.id);
      await refresh();
    });
  });

  renderReport(currentPeriod);
}

function renderReport(period) {
  currentPeriod = period;
  const touched = tasks
    .filter(t => inPeriod(t.Updated||t.Created, period))
    .sort((a,b) => new Date(b.Updated||b.Created) - new Date(a.Updated||a.Created));
  document.getElementById('reportList').innerHTML = touched.length
    ? touched.map(t => `<div class="task-row">
        <div class="task-title">${t.Title||''}</div>
        <div class="task-updated" style="color:${t.Status==='Done'?'#4ade80':'#94a3b8'}">${t.Status||'Open'} · ${fmt(t.Updated||t.Created)}</div>
      </div>`).join('')
    : '<p class="empty">No tasks edited in this period.</p>';
}

async function refresh() {
  tasks = await WorkHub.getTab('My Tasks');
  render();
}

(async function() {
  await WorkHub.requireAccess();
  await refresh();

  document.getElementById('newTask').addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const title = e.target.value.trim();
    if (!title) return;
    await WorkHub.saveRow('My Tasks', { 'Title': title, 'Status': 'Open' });
    e.target.value = '';
    await refresh();
  });

  document.querySelectorAll('.period-btns button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btns button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderReport(btn.dataset.period);
    });
  });
})();
</script>
</body>
</html>
