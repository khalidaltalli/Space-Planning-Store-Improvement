<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Work Hub — Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<style>
  body { font-family: -apple-system, Segoe UI, sans-serif; background:#f4f6f8; margin:0; color:#1a1a1a; }
  header { background:#1a3a5c; color:#fff; padding:18px 24px; }
  header h1 { margin:0; font-size:20px; }
  nav { display:flex; flex-wrap:wrap; gap:8px; padding:14px 24px; background:#fff; border-bottom:1px solid #e0e0e0; }
  nav a { color:#1a3a5c; text-decoration:none; font-size:13px; padding:6px 10px; border-radius:6px; }
  nav a:hover { background:#eef2f6; }
  main { padding:24px; max-width:1100px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
  .card { background:#fff; border-radius:10px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .card .num { font-size:28px; font-weight:700; color:#1a3a5c; }
  .card .label { font-size:12px; color:#666; margin-top:4px; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  th, td { text-align:left; padding:10px 12px; font-size:13px; border-bottom:1px solid #eee; }
  th { background:#f0f3f6; color:#444; }
  .status { padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
  .status.Receiving { background:#fff3cd; color:#856404; }
  .status.Live { background:#d4edda; color:#155724; }
</style>
</head>
<body>
<header><h1>My Work Hub</h1></header>
<nav>
  <a href="index.html">Dashboard</a>
  <a href="branch-queue.html">Branch Work Queue</a>
  <a href="#">Layout Preparation</a>
  <a href="#">Asset Receiving</a>
  <a href="#">Procurement Follow-up</a>
  <a href="#">Delivery Notes Follow-up</a>
  <a href="#">Notes & Activity</a>
  <a href="#">Time Tracking</a>
  <a href="#">Personal Reports</a>
</nav>
<main>
  <div class="cards" id="summaryCards">
    <div class="card"><div class="num">…</div><div class="label">Receiving Branches</div></div>
    <div class="card"><div class="num">…</div><div class="label">Live Branches</div></div>
    <div class="card"><div class="num">…</div><div class="label">Open Tasks</div></div>
  </div>
  <h3>Branches in Receiving</h3>
  <table>
    <thead><tr><th>Branch Code</th><th>Status</th><th>Receiving Date</th></tr></thead>
    <tbody id="branchRows"><tr><td colspan="3">Loading…</td></tr></tbody>
  </table>
</main>

<script src="api.js"></script>
<script>
(async function () {
  await WorkHub.requireAccess();

  const branches = await WorkHub.getBranches();
  const receiving = branches.filter(b => b.status === 'Receiving');
  const live = branches.filter(b => b.status === 'Live');
  let myTasks = [];
  try { myTasks = await WorkHub.getTab('My Tasks'); } catch (e) { /* tab empty on first run */ }
  const openTasks = myTasks.filter(t => t.Status !== 'Done');

  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="num">${receiving.length}</div><div class="label">Receiving Branches</div></div>
    <div class="card"><div class="num">${live.length}</div><div class="label">Live Branches</div></div>
    <div class="card"><div class="num">${openTasks.length}</div><div class="label">Open Tasks</div></div>
  `;

  document.getElementById('branchRows').innerHTML = receiving.length
    ? receiving.map(b => `
        <tr>
          <td><a href="branch-queue.html?branch=${encodeURIComponent(b.branchCode)}">${b.branchCode}</a></td>
          <td><span class="status ${b.status}">${b.status}</span></td>
          <td>${b.receivingDate || '—'}</td>
        </tr>`).join('')
    : '<tr><td colspan="3">No branches in Receiving</td></tr>';
})();
</script>
</body>
</html>
