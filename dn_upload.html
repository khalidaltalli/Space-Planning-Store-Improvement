<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delivery Note Upload</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'DM Sans', sans-serif; background:#0f1117; color:#e2e8f0; min-height:100vh; padding:1.5rem; }

  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; padding-bottom:1rem; border-bottom:0.5px solid rgba(255,255,255,0.08); }
  .header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .header p  { font-size:12px; color:#94a3b8; margin-top:3px; font-weight:500; }
  .live-badge { display:flex; align-items:center; gap:6px; font-size:11px; color:#22d3ee; background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); padding:5px 12px; border-radius:20px; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#22d3ee; box-shadow:0 0 6px #22d3ee; }

  .config { font-size:11px; color:#64748b; margin-bottom:14px; border:0.5px dashed rgba(255,255,255,0.12); padding:12px 14px; border-radius:8px; display:none; }
  .config.show { display:block; }
  .config input { width:100%; font-family:'DM Mono', monospace; font-size:11px; background:#0f1117; border:0.5px solid rgba(255,255,255,0.12); color:#e2e8f0; padding:7px 10px; border-radius:6px; margin-top:6px; }
  .config button { margin-top:8px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; background:#22d3ee; color:#0f1117; border:none; padding:7px 14px; border-radius:6px; cursor:pointer; }
  .config-toggle { font-size:10px; color:#64748b; text-decoration:underline; cursor:pointer; margin-bottom:14px; display:inline-block; }

  .toolbar { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar-left { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  select.filter, input.search {
    font-family:'DM Sans',sans-serif; font-size:12px; color:#e2e8f0;
    background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.12); border-radius:7px; padding:8px 10px;
  }
  select.filter:focus, input.search:focus { outline:none; border-color:rgba(34,211,238,0.4); }
  input.search { width:180px; }

  .btn-add { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; background:rgba(34,211,238,0.1); color:#22d3ee; border:0.5px solid rgba(34,211,238,0.3); border-radius:7px; padding:8px 12px; cursor:pointer; white-space:nowrap; }
  .btn-add:hover { background:rgba(34,211,238,0.18); }

  .manual-panel { display:none; background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.08); border-radius:10px; padding:14px; margin-bottom:16px; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .manual-panel.show { display:flex; }
  .manual-panel .field { display:flex; flex-direction:column; gap:4px; }
  .manual-panel label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:#94a3b8; font-weight:600; }
  .manual-panel input { font-family:'DM Sans',sans-serif; font-size:12px; color:#e2e8f0; background:#0f1117; border:0.5px solid rgba(255,255,255,0.12); border-radius:6px; padding:7px 9px; width:160px; }
  .manual-panel button { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; background:#22d3ee; color:#0f1117; border:none; border-radius:6px; padding:8px 16px; cursor:pointer; }

  .table-wrap { background:#161a24; border:0.5px solid rgba(255,255,255,0.08); border-radius:12px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th {
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; font-weight:700;
    color:#fff; background:#1a1f2e; padding:12px 16px; border-bottom:0.5px solid rgba(255,255,255,0.08);
  }
  tbody td { padding:11px 16px; border-bottom:0.5px solid rgba(255,255,255,0.05); vertical-align:middle; }
  tbody tr:nth-child(even) { background:rgba(255,255,255,0.012); }
  tbody tr:hover td { background:rgba(34,211,238,0.03); }
  tbody tr:last-child td { border-bottom:none; }

  .branch-code { color:#22d3ee; font-family:'DM Mono', monospace; font-weight:600; font-size:12px; letter-spacing:0.2px; }

  .asset-pill {
    display:inline-block; font-size:11px; font-weight:500; color:#fb7185;
    background:rgba(251,113,133,0.1); border:0.5px solid rgba(251,113,133,0.2);
    padding:4px 11px; border-radius:20px;
  }

  .dn-cell { display:flex; align-items:center; gap:8px; }
  .pill { font-size:10px; padding:4px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:5px; font-weight:600; white-space:nowrap; }
  .pill.notsigned { background:rgba(251,191,36,0.1); color:#fbbf24; border:0.5px solid rgba(251,191,36,0.25); }
  .pill.signed { background:rgba(74,222,128,0.1); color:#4ade80; border:0.5px solid rgba(74,222,128,0.25); }
  .pill.none { background:rgba(255,255,255,0.04); color:#64748b; border:0.5px solid rgba(255,255,255,0.08); }
  a.pill-link { text-decoration:none; }

  .icon-btn {
    width:22px; height:22px; border-radius:6px; border:0.5px solid rgba(255,255,255,0.12);
    background:#0f1117; color:#94a3b8; cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
    font-size:11px; flex-shrink:0;
  }
  .icon-btn:hover { color:#22d3ee; border-color:rgba(34,211,238,0.4); }

  .add-link { font-size:11px; font-weight:600; color:#22d3ee; background:rgba(34,211,238,0.08); border:0.5px dashed rgba(34,211,238,0.3); padding:4px 11px; border-radius:20px; cursor:pointer; }
  .add-link:hover { background:rgba(34,211,238,0.15); }

  .empty { font-size:12px; color:#64748b; padding:24px; text-align:center; }
  .row-uploading { opacity:0.5; pointer-events:none; }

  input.hidden-file { display:none; }

  .toast {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#1a1f2e; border:0.5px solid rgba(74,222,128,0.3); color:#4ade80;
    font-size:12px; padding:10px 18px; border-radius:8px; opacity:0; pointer-events:none; transition:all .25s;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.err { border-color:rgba(248,113,113,0.3); color:#f87171; }
</style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Delivery Note Upload</h1>
      <p>Asset receiving — branch &amp; asset delivery notes</p>
    </div>
    <div class="live-badge"><div class="live-dot"></div> Kamal</div>
  </div>

  <span class="config-toggle" id="cfgToggle">setup / connection</span>
  <div class="config" id="cfgBox">
    Apps Script Web App URL (same one behind the Receiving Tracker):
    <input id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    <button id="cfgSave">Save</button>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <select class="filter" id="branchFilter"><option value="ALL">All branches</option></select>
      <input class="search" id="assetSearch" placeholder="Search asset…" />
    </div>
    <button class="btn-add" id="manualToggle">+ branch / asset not listed</button>
  </div>

  <div class="manual-panel" id="manualPanel">
    <div class="field"><label>Branch code</label><input id="manualBranch" placeholder="e.g. ALK-ASM002" /></div>
    <div class="field"><label>Asset</label><input id="manualAsset" placeholder="e.g. Freezer" /></div>
    <button id="manualSubmit">Add row</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Branch</th><th>Asset</th><th>D.N. Not Signed</th><th>D.N. Signed</th></tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" class="empty">Connect the tracker above to load branches and assets.</td></tr>
      </tbody>
    </table>
  </div>

  <input type="file" id="hiddenFile" class="hidden-file" accept=".pdf,image/*" />
  <div class="toast" id="toast"></div>

<script>
const TRACKER_SHEET = 'Asset Tracker';
const MANUAL_SHEET = 'Manual Additions';
let APPS_SCRIPT_URL = localStorage.getItem('dn_apps_script_url') || '';

const cfgToggle = document.getElementById('cfgToggle');
const cfgBox = document.getElementById('cfgBox');
const cfgUrl = document.getElementById('cfgUrl');
const cfgSave = document.getElementById('cfgSave');
cfgUrl.value = APPS_SCRIPT_URL;
if(!APPS_SCRIPT_URL) cfgBox.classList.add('show');
cfgToggle.onclick = () => cfgBox.classList.toggle('show');
cfgSave.onclick = () => {
  APPS_SCRIPT_URL = cfgUrl.value.trim();
  localStorage.setItem('dn_apps_script_url', APPS_SCRIPT_URL);
  cfgBox.classList.remove('show');
  init();
};

const branchFilter = document.getElementById('branchFilter');
const assetSearch = document.getElementById('assetSearch');
const tbody = document.getElementById('tbody');
const hiddenFile = document.getElementById('hiddenFile');
const toast = document.getElementById('toast');
const manualToggle = document.getElementById('manualToggle');
const manualPanel = document.getElementById('manualPanel');
const manualBranch = document.getElementById('manualBranch');
const manualAsset = document.getElementById('manualAsset');
const manualSubmit = document.getElementById('manualSubmit');

let rows = []; // { branch, asset, dnNotSigned, dnSigned }
let pendingRow = null;

manualToggle.onclick = () => manualPanel.classList.toggle('show');

function showToast(msg, isErr){
  toast.textContent = msg;
  toast.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => toast.classList.remove('show'), 2600);
}

async function fetchSheet(sheet){
  const res = await fetch(`${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
  return res.json();
}

async function postAction(payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(() => ({}));
  if(data && data.error) throw new Error(data.error);
  return data;
}

async function loadAll(){
  tbody.innerHTML = '<tr><td colspan="4" class="empty">Loading…</td></tr>';
  try{
    const importJson = await fetchSheet('Import');
    const headers = importJson.headers || [];
    const branches = headers.filter(h => h && h !== 'Asset');
    const base = [];
    (importJson.rows || []).forEach(row => {
      const asset = row['Asset'];
      if(!asset) return;
      branches.forEach(b => { if((row[b]||'').trim() !== '') base.push({ branch: b, asset }); });
    });

    try{
      const manualJson = await fetchSheet(MANUAL_SHEET);
      (manualJson.rows || []).forEach(r => {
        const type = (r['Type']||'').trim();
        const branch = (r['Branch']||'').trim();
        const value = (r['Value']||'').trim();
        if(type === 'Asset' && branch && value) base.push({ branch, asset: value });
        if(type === 'Branch' && value && !branches.includes(value)) branches.push(value);
      });
    }catch(e){}

    let trackerMap = {};
    try{
      const trackerJson = await fetchSheet(TRACKER_SHEET);
      (trackerJson.rows || []).forEach(r => {
        const key = `${(r['Branch Code']||'').trim()}|${(r['Asset']||'').trim()}`;
        trackerMap[key] = {
          dnNotSigned: r['D.N. Link Not Signed'] || '',
          dnSigned: r['D.N. Link Signed'] || ''
        };
      });
    }catch(e){}

    rows = base.map(r => {
      const key = `${r.branch}|${r.asset}`;
      const t = trackerMap[key] || {};
      return { branch: r.branch, asset: r.asset, dnNotSigned: t.dnNotSigned || '', dnSigned: t.dnSigned || '' };
    });

    branchFilter.innerHTML = '<option value="ALL">All branches</option>' +
      branches.sort().map(b => `<option value="${b}">${b}</option>`).join('');

    render();
  }catch(e){
    tbody.innerHTML = '<tr><td colspan="4" class="empty">Could not load — check connection URL.</td></tr>';
  }
}

function render(){
  const branchVal = branchFilter.value;
  const search = assetSearch.value.trim().toLowerCase();
  const filtered = rows.filter(r =>
    (branchVal === 'ALL' || r.branch === branchVal) &&
    (!search || r.asset.toLowerCase().includes(search))
  );

  if(!filtered.length){ tbody.innerHTML = '<tr><td colspan="4" class="empty">No matching rows.</td></tr>'; return; }

  tbody.innerHTML = filtered.map((r, i) => {
    const idx = rows.indexOf(r);
    const ns = r.dnNotSigned
      ? `<a class="pill-link" href="${r.dnNotSigned}" target="_blank"><span class="pill notsigned">📄 view</span></a><button class="icon-btn" data-idx="${idx}" data-action="upload" title="Replace">✎</button>`
      : `<span class="add-link" data-idx="${idx}" data-action="upload">+ add</span>`;
    const sg = r.dnSigned
      ? `<a class="pill-link" href="${r.dnSigned}" target="_blank"><span class="pill signed">✓ signed</span></a>`
      : `<span class="pill none">None</span>`;
    return `<tr data-row="${idx}">
      <td><span class="branch-code">${r.branch}</span></td>
      <td><span class="asset-pill">${r.asset}</span></td>
      <td><div class="dn-cell">${ns}</div></td>
      <td><div class="dn-cell">${sg}</div></td>
    </tr>`;
  }).join('');
}

branchFilter.onchange = render;
assetSearch.oninput = render;

tbody.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action="upload"]');
  if(!target) return;
  if(!APPS_SCRIPT_URL){ showToast('Set the connection URL first.', true); return; }
  pendingRow = parseInt(target.dataset.idx, 10);
  hiddenFile.value = '';
  hiddenFile.click();
});

function toBase64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

hiddenFile.onchange = async () => {
  const file = hiddenFile.files[0];
  if(!file || pendingRow === null) return;
  const r = rows[pendingRow];
  const tr = tbody.querySelector(`tr[data-row="${pendingRow}"]`);
  if(tr) tr.classList.add('row-uploading');
  try{
    const base64 = await toBase64(file);
    await postAction({
      action: 'uploadDN',
      sheet: TRACKER_SHEET,
      branch: r.branch,
      asset: r.asset,
      field: 'D.N. Link Not Signed',
      fileName: file.name,
      mimeType: file.type || 'application/octet-stream',
      fileData: base64
    });
    showToast(`Uploaded for ${r.branch} / ${r.asset}`);
    await loadAll();
  }catch(err){
    showToast('Upload failed: ' + err.message, true);
    if(tr) tr.classList.remove('row-uploading');
  }
};

manualSubmit.onclick = async () => {
  const branch = manualBranch.value.trim();
  const asset = manualAsset.value.trim();
  if(!branch || !asset){ showToast('Enter both branch and asset.', true); return; }
  if(!APPS_SCRIPT_URL){ showToast('Set the connection URL first.', true); return; }
  manualSubmit.disabled = true; manualSubmit.textContent = 'Adding…';
  try{
    await postAction({ action: 'addManual', sheet: MANUAL_SHEET, type: 'Asset', value: asset, branch });
    manualBranch.value = ''; manualAsset.value = '';
    manualPanel.classList.remove('show');
    showToast('Row added.');
    await loadAll();
  }catch(e){
    showToast('Could not add row: ' + e.message, true);
  }
  manualSubmit.disabled = false; manualSubmit.textContent = 'Add row';
};

function init(){
  if(!APPS_SCRIPT_URL) return;
  loadAll();
  setInterval(loadAll, 30000);
}
init();
</script>
</body>
</html>
