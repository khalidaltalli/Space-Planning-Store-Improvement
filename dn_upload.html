<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delivery Note Upload</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'DM Sans', sans-serif; background:#0f1117; color:#e2e8f0; min-height:100vh; padding:1.5rem; }

  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:0.5px solid rgba(255,255,255,0.08); }
  .header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .header p  { font-size:12px; color:#f1f5f9; margin-top:3px; font-weight:500; }
  .live-badge { display:flex; align-items:center; gap:6px; font-size:11px; color:#22d3ee; background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); padding:5px 12px; border-radius:20px; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#22d3ee; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .btn { background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); color:#22d3ee; font-size:12px; padding:6px 14px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.15s; }
  .btn:hover { background:rgba(34,211,238,0.15); }

  .config { font-size:11px; color:#64748b; margin-bottom:14px; border:0.5px dashed rgba(255,255,255,0.12); padding:12px 14px; border-radius:8px; display:none; }
  .config.show { display:block; }
  .config input { width:100%; font-family:'DM Mono', monospace; font-size:11px; background:#0f1117; border:0.5px solid rgba(255,255,255,0.12); color:#e2e8f0; padding:7px 10px; border-radius:6px; margin-top:6px; }
  .config-toggle { font-size:10px; color:#64748b; text-decoration:underline; cursor:pointer; margin-bottom:14px; display:inline-block; }

  .controls { display:flex; gap:10px; margin-bottom:0.9rem; align-items:center; flex-wrap:wrap; }
  .controls label { font-size:12px; color:#f1f5f9; font-weight:500; }
  select.filter, input.search { background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.12); color:#e2e8f0; font-size:12px; padding:6px 10px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  input.search { width:180px; cursor:text; }
  select.filter:focus, input.search:focus { outline:none; border-color:rgba(34,211,238,0.4); }

  .table-card { background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.07); border-radius:10px; padding:1rem 1.25rem; margin-bottom:1.25rem; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { text-align:center; padding:8px 10px; color:#f1f5f9; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.4px; border-bottom:1px solid rgba(255,255,255,0.4); border-right:0.5px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.02); }
  th:first-child { text-align:left; } th:last-child { border-right:none; }
  td { padding:8px 10px; color:#f1f5f9; text-align:center; border-bottom:0.5px solid rgba(255,255,255,0.15); border-right:0.5px solid rgba(255,255,255,0.08); }
  td:first-child { text-align:left; } td:last-child { border-right:none; }
  tbody tr:nth-child(odd)  td { background:rgba(255,255,255,0.03); }
  tbody tr:nth-child(even) td { background:rgba(255,255,255,0.07); }
  tbody tr:hover           td { background:rgba(255,255,255,0.12); }

  .branch-link { color:#22d3ee; text-decoration:none; font-weight:700; }
  .asset-pill { display:inline-block; font-size:11px; font-weight:500; color:#fb7185; background:rgba(251,113,133,0.1); border:0.5px solid rgba(251,113,133,0.2); padding:4px 11px; border-radius:20px; }

  .dn-cell { display:inline-flex; align-items:center; gap:6px; justify-content:center; }
  .dn-link { color:#22d3ee; font-size:11px; text-decoration:none; }
  .dn-link:hover { text-decoration:underline; }
  .dn-add-btn { font-size:10px; padding:2px 8px; border-radius:6px; background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); color:#22d3ee; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .dn-edit-btn { font-size:9px; padding:1px 6px; border-radius:4px; background:rgba(255,255,255,0.05); border:0.5px solid rgba(255,255,255,0.1); color:#64748b; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .dn-none { font-size:10px; color:#475569; }

  .manual-panel { display:none; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem; }
  .manual-panel.show { display:flex; }
  .manual-panel .field { display:flex; flex-direction:column; gap:4px; }
  .manual-panel label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:#94a3b8; font-weight:600; }
  .manual-panel input { font-family:'DM Sans',sans-serif; font-size:12px; color:#e2e8f0; background:#0f1117; border:0.5px solid rgba(255,255,255,0.12); border-radius:6px; padding:7px 9px; width:170px; }
  .manual-panel button { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; background:rgba(74,222,128,0.08); border:0.5px solid rgba(74,222,128,0.2); color:#4ade80; border-radius:6px; padding:8px 16px; cursor:pointer; }

  .row-uploading { opacity:0.5; pointer-events:none; }
  .loading { text-align:center; padding:3rem; color:#64748b; font-size:13px; }
  .empty { text-align:center; padding:2rem; color:#64748b; font-size:12px; }

  input.hidden-file { display:none; }

  .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:#1a1f2e; border:0.5px solid rgba(74,222,128,0.3); color:#4ade80; font-size:12px; padding:8px 16px; border-radius:8px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200; }
  .toast.show { opacity:1; }
  .toast.err { border-color:rgba(248,113,113,0.3); color:#f87171; }
</style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Delivery Note Upload</h1>
      <p>New Store Asset Receiving — Kamal</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="live-badge"><div class="live-dot"></div> Live</div>
      <button class="btn" id="refreshBtn">↻ Refresh</button>
    </div>
  </div>

  <span class="config-toggle" id="cfgToggle">setup / connection</span>
  <div class="config" id="cfgBox">
    Apps Script Web App URL:
    <input id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec" />
  </div>

  <div class="controls">
    <label>Status:</label>
    <select class="filter" id="statusFilter">
      <option value="ALL">All Branches</option>
      <option value="Receiving" selected>Receiving</option>
      <option value="Live">Live</option>
      <option value="Pending">Pending</option>
    </select>
    <label>Branch:</label>
    <select class="filter" id="branchFilter"><option value="ALL">All Branches</option></select>
    <input class="search" id="assetSearch" placeholder="Search asset…" />
    <button class="btn" id="manualToggle" style="margin-left:auto;">+ branch / asset not listed</button>
  </div>

  <div class="manual-panel" id="manualPanel">
    <div class="field"><label>Branch code</label><input id="manualBranch" placeholder="e.g. JED-SHZ002" /></div>
    <div class="field"><label>Asset</label><input id="manualAsset" placeholder="e.g. Freezer" /></div>
    <button id="manualSubmit">Add row</button>
  </div>

  <div class="table-card">
    <table>
      <thead><tr><th>Branch</th><th>Asset</th><th>D.N. Not Signed</th><th>D.N. Signed</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="4" class="loading">Loading…</td></tr></tbody>
    </table>
  </div>

  <input type="file" id="hiddenFile" class="hidden-file" accept=".pdf,image/*" />
  <div class="toast" id="toast"></div>

<script>
const TRACKER_SHEET = 'Receiving Checklist';
let APPS_URL = localStorage.getItem('dn_apps_script_url') || 'https://script.google.com/macros/s/AKfycbyXMNhT-y0fQlFGG20lx_fD-47N39O5BvUl9QfMukrEyP0jnl8ckGCyS_ZUOphGfZ2Pww/exec';

const cfgToggle = document.getElementById('cfgToggle');
const cfgBox = document.getElementById('cfgBox');
const cfgUrl = document.getElementById('cfgUrl');
cfgUrl.value = APPS_URL;
cfgToggle.onclick = () => cfgBox.classList.toggle('show');
cfgUrl.onchange = () => {
  APPS_URL = cfgUrl.value.trim();
  localStorage.setItem('dn_apps_script_url', APPS_URL);
  loadAll();
};

const statusFilter = document.getElementById('statusFilter');
const branchFilter = document.getElementById('branchFilter');
const assetSearch = document.getElementById('assetSearch');
const tbody = document.getElementById('tbody');
const hiddenFile = document.getElementById('hiddenFile');
const toast = document.getElementById('toast');
const manualToggle = document.getElementById('manualToggle');
const manualPanel = document.getElementById('manualPanel');
const manualBranch = document.getElementById('manualBranch');
const manualAsset = document.getElementById('manualAsset');
const manualSubmit = document.getElementById('manualSubmit');

let checklist = [];   // raw rows from Receiving Checklist
let branchStatusMap = {}; // branch -> status
let pendingRow = null;

manualToggle.onclick = () => manualPanel.classList.toggle('show');

function showToast(msg, isErr){
  toast.textContent = msg;
  toast.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => toast.classList.remove('show'), 2600);
}

async function fetchSheet(name){
  const res = await fetch(`${APPS_URL}?sheet=${encodeURIComponent(name)}`);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

async function postAction(payload){
  await fetch(APPS_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
}

async function loadAll(){
  tbody.innerHTML = '<tr><td colspan="4" class="loading">Loading…</td></tr>';
  try{
    const cl = await fetchSheet(TRACKER_SHEET);
    checklist = cl.rows || [];

    branchStatusMap = {};
    const seen = new Set();
    const branchList = [];
    checklist.forEach(r=>{
      const b=(r['Branch Code']||'').trim(), bs=(r['Branch Status']||'').trim();
      if(b && !seen.has(b)){ seen.add(b); branchList.push(b); branchStatusMap[b]=bs; }
    });
    branchList.sort();

    branchFilter.innerHTML = '<option value="ALL">All Branches</option>' +
      branchList.map(b=>`<option value="${b}">${b}</option>`).join('');

    render();
  }catch(e){
    tbody.innerHTML = `<tr><td colspan="4" class="empty">Could not load — check connection URL.<br>${e.message}</td></tr>`;
  }
}

function render(){
  const status = statusFilter.value;
  const branchVal = branchFilter.value;
  const search = assetSearch.value.trim().toLowerCase();

  const rows = checklist.filter(r=>{
    const b=(r['Branch Code']||'').trim();
    const bs=(r['Branch Status']||'').trim();
    const asset=(r['Asset']||'').trim();
    if(!b || !asset) return false;
    if(status!=='ALL' && bs!==status) return false;
    if(branchVal!=='ALL' && b!==branchVal) return false;
    if(search && !asset.toLowerCase().includes(search)) return false;
    return true;
  });

  if(!rows.length){ tbody.innerHTML = '<tr><td colspan="4" class="empty">No matching rows.</td></tr>'; return; }

  tbody.innerHTML = rows.map((r, i) => {
    const idx = checklist.indexOf(r);
    const branch = (r['Branch Code']||'').trim();
    const asset = (r['Asset']||'').trim();
    const ns = r['D.N. Not Signed'] || '';
    const s  = r['D.N. Signed'] || '';
    const nsHtml = ns
      ? `<div class="dn-cell"><a class="dn-link" href="${ns}" target="_blank">View D.N.</a><button class="dn-edit-btn" data-idx="${idx}" data-action="upload">✎</button></div>`
      : `<div class="dn-cell"><button class="dn-add-btn" data-idx="${idx}" data-action="upload">+ Add</button></div>`;
    const sHtml = s
      ? `<div class="dn-cell"><a class="dn-link" href="${s}" target="_blank">View Signed</a></div>`
      : `<span class="dn-none">None</span>`;
    return `<tr data-row="${idx}">
      <td><a class="branch-link" href="#">${branch}</a></td>
      <td><span class="asset-pill">${asset}</span></td>
      <td>${nsHtml}</td>
      <td>${sHtml}</td>
    </tr>`;
  }).join('');
}

statusFilter.onchange = render;
branchFilter.onchange = render;
assetSearch.oninput = render;
document.getElementById('refreshBtn').onclick = loadAll;

tbody.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action="upload"]');
  if(!target) return;
  pendingRow = parseInt(target.dataset.idx, 10);
  hiddenFile.value = '';
  hiddenFile.click();
});

function toBase64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

hiddenFile.onchange = async () => {
  const file = hiddenFile.files[0];
  if(!file || pendingRow === null) return;
  const r = checklist[pendingRow];
  const branch = (r['Branch Code']||'').trim();
  const asset = (r['Asset']||'').trim();
  const tr = tbody.querySelector(`tr[data-row="${pendingRow}"]`);
  if(tr) tr.classList.add('row-uploading');
  try{
    const base64 = await toBase64(file);
    await postAction({
      action: 'uploadDN',
      sheet: TRACKER_SHEET,
      branch, asset,
      field: 'D.N. Not Signed',
      fileName: file.name,
      mimeType: file.type || 'application/octet-stream',
      fileData: base64,
      user: 'Kamal',
      timestamp: new Date().toLocaleString('en-GB')
    });
    showToast(`Uploaded for ${branch} / ${asset}`);
    await loadAll();
  }catch(err){
    showToast('Upload failed: ' + err.message, true);
    if(tr) tr.classList.remove('row-uploading');
  }
};

manualSubmit.onclick = async () => {
  const branch = manualBranch.value.trim().toUpperCase();
  const asset = manualAsset.value.trim();
  if(!branch || !asset){ showToast('Enter both branch and asset.', true); return; }
  manualSubmit.disabled = true; manualSubmit.textContent = 'Adding…';
  try{
    const existingStatus = branchStatusMap[branch] || 'Receiving';
    await postAction({
      action: 'addManualAsset',
      sheet: TRACKER_SHEET,
      branch, asset,
      branchStatus: existingStatus,
      user: 'Kamal',
      timestamp: new Date().toLocaleString('en-GB')
    });
    manualBranch.value=''; manualAsset.value='';
    manualPanel.classList.remove('show');
    showToast('Row added — refreshing…');
    setTimeout(loadAll, 1500);
  }catch(e){
    showToast('Could not add row: ' + e.message, true);
  }
  manualSubmit.disabled = false; manualSubmit.textContent = 'Add row';
};

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
