<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delivery Note Upload</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'DM Sans', sans-serif; background:#0f1117; color:#e2e8f0; min-height:100vh; padding:1.5rem; }

  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; padding-bottom:1rem; border-bottom:0.5px solid rgba(255,255,255,0.08); }
  .header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .header p  { font-size:12px; color:#f1f5f9; margin-top:3px; font-weight:500; }
  .live-badge { display:flex; align-items:center; gap:6px; font-size:11px; color:#22d3ee; background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); padding:5px 12px; border-radius:20px; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#22d3ee; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .btn { background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); color:#22d3ee; font-size:12px; padding:6px 14px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.15s; }
  .btn:hover { background:rgba(34,211,238,0.15); }

  /* ── To-do bubble ── */
  .todo-bar { display:flex; align-items:center; gap:10px; margin-bottom:1.1rem; padding:10px 16px; border-radius:10px; background:rgba(251,191,36,0.08); border:0.5px solid rgba(251,191,36,0.25); }
  .todo-bar.clear { background:rgba(74,222,128,0.08); border-color:rgba(74,222,128,0.25); }
  .todo-count { font-family:'DM Mono',monospace; font-size:18px; font-weight:700; color:#fbbf24; }
  .todo-bar.clear .todo-count { color:#4ade80; }
  .todo-text { font-size:12px; color:#f1f5f9; }
  .todo-text b { color:#fff; }

  .controls { display:flex; gap:10px; margin-bottom:1.1rem; align-items:center; flex-wrap:wrap; }
  .controls label { font-size:12px; color:#f1f5f9; font-weight:500; }
  select.filter { background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.12); color:#e2e8f0; font-size:12px; padding:6px 10px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  select.filter:focus { outline:none; border-color:rgba(34,211,238,0.4); }

  .manual-panel { display:none; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem; }
  .manual-panel.show { display:flex; }
  .manual-panel .field { display:flex; flex-direction:column; gap:4px; }
  .manual-panel label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:#94a3b8; font-weight:600; }
  .manual-panel input { font-family:'DM Sans',sans-serif; font-size:12px; color:#e2e8f0; background:#0f1117; border:0.5px solid rgba(255,255,255,0.12); border-radius:6px; padding:7px 9px; width:170px; }
  .manual-panel button { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; background:rgba(74,222,128,0.08); border:0.5px solid rgba(74,222,128,0.2); color:#4ade80; border-radius:6px; padding:8px 16px; cursor:pointer; }

  /* ── Branch pill / card ── */
  .branch-card { background:#1a1f2e; border:0.5px solid rgba(255,255,255,0.07); border-radius:10px; margin-bottom:0.85rem; overflow:hidden; }
  .branch-pill-head { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.1rem; cursor:pointer; background:rgba(255,255,255,0.02); }
  .branch-pill-head:hover { background:rgba(255,255,255,0.04); }
  .branch-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .branch-code { color:#fff; font-weight:700; font-size:14px; }
  .status-chip { font-size:10px; padding:2px 9px; border-radius:10px; font-weight:600; }
  .status-Receiving { background:rgba(34,211,238,0.12); color:#22d3ee; }
  .status-Live      { background:rgba(74,222,128,0.12); color:#4ade80; }
  .status-Pending   { background:rgba(251,191,36,0.12); color:#fbbf24; }
  .pill { font-size:10px; padding:2px 9px; border-radius:10px; font-weight:600; }
  .pill-missing { background:rgba(251,191,36,0.1); color:#fbbf24; }
  .pill-done    { background:rgba(74,222,128,0.1); color:#4ade80; }
  .chevron { color:#64748b; font-size:11px; transition:transform 0.2s; }

  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { text-align:center; padding:8px 10px; color:#f1f5f9; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.4px; border-bottom:1px solid rgba(255,255,255,0.25); border-right:0.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.02); }
  th:first-child { text-align:left; } th:last-child { border-right:none; }
  td { padding:8px 10px; color:#f1f5f9; text-align:center; border-bottom:0.5px solid rgba(255,255,255,0.08); border-right:0.5px solid rgba(255,255,255,0.05); }
  td:first-child { text-align:left; } td:last-child { border-right:none; }
  tbody tr:nth-child(odd)  td { background:rgba(255,255,255,0.02); }
  tbody tr:nth-child(even) td { background:rgba(255,255,255,0.04); }
  tbody tr:hover td { background:rgba(255,255,255,0.07); }

  .asset-pill { display:inline-block; font-size:11px; font-weight:500; color:#fb7185; background:rgba(251,113,133,0.1); border:0.5px solid rgba(251,113,133,0.2); padding:4px 11px; border-radius:20px; }

  .dn-cell { display:inline-flex; align-items:center; gap:6px; justify-content:center; }
  .dn-link { color:#22d3ee; font-size:11px; text-decoration:none; }
  .dn-link:hover { text-decoration:underline; }
  .dn-add-btn { font-size:10px; padding:2px 8px; border-radius:6px; background:rgba(34,211,238,0.08); border:0.5px solid rgba(34,211,238,0.2); color:#22d3ee; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .dn-edit-btn { font-size:9px; padding:1px 6px; border-radius:4px; background:rgba(255,255,255,0.05); border:0.5px solid rgba(255,255,255,0.1); color:#64748b; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .dn-none { font-size:10px; color:#475569; }

  .row-uploading { opacity:0.5; pointer-events:none; }
  .loading { text-align:center; padding:3rem; color:#64748b; font-size:13px; }
  .empty { text-align:center; padding:2rem; color:#64748b; font-size:12px; }

  input.hidden-file { display:none; }

  .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:#1a1f2e; border:0.5px solid rgba(74,222,128,0.3); color:#4ade80; font-size:12px; padding:8px 16px; border-radius:8px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200; }
  .toast.show { opacity:1; }
  .toast.err { border-color:rgba(248,113,113,0.3); color:#f87171; }
</style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Delivery Note Upload</h1>
      <p>New Store Asset Receiving — Kamal</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="live-badge"><div class="live-dot"></div> Live</div>
      <button class="btn" id="refreshBtn">↻ Refresh</button>
    </div>
  </div>

  <div class="todo-bar" id="todoBar">
    <span class="todo-count" id="todoCount">0</span>
    <span class="todo-text" id="todoText">delivery notes still missing</span>
  </div>

  <div class="controls">
    <label>Branch Status:</label>
    <select class="filter" id="statusFilter">
      <option value="ALL">All Branches</option>
      <option value="Receiving" selected>Receiving</option>
      <option value="Live">Live</option>
      <option value="Pending">Pending</option>
    </select>
    <label>Branch:</label>
    <select class="filter" id="branchFilter"><option value="ALL">All Branches</option></select>
    <label>D.N. Status:</label>
    <select class="filter" id="dnStatusFilter">
      <option value="ALL">All</option>
      <option value="Missing">Missing (No D.N.)</option>
      <option value="Awaiting">Awaiting Signature</option>
      <option value="Signed">Signed</option>
    </select>
    <label>Asset:</label>
    <select class="filter" id="assetFilter"><option value="ALL">All Assets</option></select>
    <button class="btn" id="manualToggle" style="margin-left:auto;">+ branch / asset not listed</button>
  </div>

  <div class="manual-panel" id="manualPanel">
    <div class="field"><label>Branch code</label><input id="manualBranch" placeholder="e.g. JED-SHZ002" /></div>
    <div class="field"><label>Asset</label><input id="manualAsset" placeholder="e.g. Freezer" /></div>
    <button id="manualSubmit">Add row</button>
  </div>

  <div id="branchList"><div class="loading">Loading…</div></div>

  <input type="file" id="hiddenFile" class="hidden-file" accept=".pdf,image/*" />
  <div class="toast" id="toast"></div>

<script>
const TRACKER_SHEET = 'Receiving Checklist';
const APPS_URL = 'https://script.google.com/macros/s/AKfycbyXMNhT-y0fQlFGG20lx_fD-47N39O5BvUl9QfMukrEyP0jnl8ckGCyS_ZUOphGfZ2Pww/exec';

/* Only these assets carry a delivery note. Grouped sets share one D.N. cell. */
const GROUPS = [
  { name: 'Chillers & Freezers',   assets: ['1 Door Chiller','2 Door Chiller','3 Door Chiller','1 Door Freezer','2 Door Freezer','3 Door Freezer'] },
  { name: 'Coldroom',              assets: ['Coldroom'] },
  { name: 'CCTV & Access Points',  assets: ['CCTV','Access Points'] },
  { name: 'Freebolt & Heavy Racks',assets: ['Freebolt','Heavyrack','Heavy Rack'] },
  { name: 'SignBoard',             assets: ['SignBoard'] },
  { name: 'AC',                    assets: ['Air Condition'] },
  { name: 'Curtain',               assets: ['Curtain'] }
];
const ASSET_TO_GROUP = {};
GROUPS.forEach(g => g.assets.forEach(a => ASSET_TO_GROUP[a] = g.name));

const statusFilter = document.getElementById('statusFilter');
const branchFilter = document.getElementById('branchFilter');
const dnStatusFilter = document.getElementById('dnStatusFilter');
const assetFilter = document.getElementById('assetFilter');
const branchList = document.getElementById('branchList');
const hiddenFile = document.getElementById('hiddenFile');
const toast = document.getElementById('toast');
const manualToggle = document.getElementById('manualToggle');
const manualPanel = document.getElementById('manualPanel');
const manualBranch = document.getElementById('manualBranch');
const manualAsset = document.getElementById('manualAsset');
const manualSubmit = document.getElementById('manualSubmit');
const todoBar = document.getElementById('todoBar');
const todoCount = document.getElementById('todoCount');
const todoText = document.getElementById('todoText');

let checklist = [];
let groupedRows = []; // { branch, branchStatus, group, dnNotSigned, dnSigned, repIdx }
let openBranches = new Set();
let pendingGroupIdx = null;

manualToggle.onclick = () => manualPanel.classList.toggle('show');

function showToast(msg, isErr){
  toast.textContent = msg;
  toast.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => toast.classList.remove('show'), 2600);
}

async function fetchSheet(name){
  const res = await fetch(`${APPS_URL}?sheet=${encodeURIComponent(name)}`);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

async function postAction(payload){
  let res;
  try{
    res = await fetch(APPS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'}, // avoids CORS preflight, Apps Script still parses it as JSON
      body: JSON.stringify(payload)
    });
  }catch(err){
    throw new Error('Network/CORS error — check the deployment is set to "Anyone" access. (' + err.message + ')');
  }
  let data = {};
  try{ data = await res.json(); }catch(e){ /* non-JSON response */ }
  if(data && data.error) throw new Error(data.error);
  return data;
}

async function loadAll(){
  branchList.innerHTML = '<div class="loading">Loading…</div>';
  try{
    const cl = await fetchSheet(TRACKER_SHEET);
    checklist = cl.rows || [];
    buildGroupedRows();

    const branches = [...new Set(checklist.map(r=>(r['Branch Code']||'').trim()).filter(Boolean))].sort();
    branchFilter.innerHTML = '<option value="ALL">All Branches</option>' +
      branches.map(b=>`<option value="${b}">${b}</option>`).join('');

    assetFilter.innerHTML = '<option value="ALL">All Assets</option>' +
      GROUPS.map(g=>`<option value="${g.name}">${g.name}</option>`).join('');

    render();
  }catch(e){
    branchList.innerHTML = `<div class="empty">Could not load data.<br>${e.message}</div>`;
  }
}

function buildGroupedRows(){
  groupedRows = [];
  const byBranch = {};
  checklist.forEach((r, idx) => {
    const branch = (r['Branch Code']||'').trim();
    const asset = (r['Asset']||'').trim();
    if(!branch || !asset) return;
    const group = ASSET_TO_GROUP[asset];
    if(!group) return; // only DN-relevant assets
    if(!byBranch[branch]) byBranch[branch] = {};
    if(!byBranch[branch][group]) byBranch[branch][group] = { idx, row:r };
    // prefer a row that already has a D.N. value as the representative
    else if((r['D.N. Not Signed']||r['D.N. Signed']) && !(byBranch[branch][group].row['D.N. Not Signed']||byBranch[branch][group].row['D.N. Signed'])) {
      byBranch[branch][group] = { idx, row:r };
    }
  });

  Object.keys(byBranch).sort().forEach(branch => {
    GROUPS.forEach(g => {
      const rep = byBranch[branch][g.name];
      if(!rep) return;
      groupedRows.push({
        branch,
        branchStatus: (rep.row['Branch Status']||'').trim(),
        group: g.name,
        dnNotSigned: rep.row['D.N. Not Signed'] || '',
        dnSigned: rep.row['D.N. Signed'] || '',
        repIdx: rep.idx
      });
    });
  });
}

function dnState(gr){
  if(gr.dnSigned) return 'Signed';
  if(gr.dnNotSigned) return 'Awaiting';
  return 'Missing';
}

function render(){
  const statusVal = statusFilter.value;
  const branchVal = branchFilter.value;
  const dnVal = dnStatusFilter.value;
  const assetVal = assetFilter.value;

  const filtered = groupedRows.filter(gr => {
    if(statusVal!=='ALL' && gr.branchStatus!==statusVal) return false;
    if(branchVal!=='ALL' && gr.branch!==branchVal) return false;
    if(assetVal!=='ALL' && gr.group!==assetVal) return false;
    if(dnVal!=='ALL' && dnState(gr)!==dnVal) return false;
    return true;
  });

  // to-do bubble counts missing-or-awaiting across the *currently filtered branch-status scope* (not double filtered by dnVal/assetVal, so it stays meaningful)
  const scopeForTodo = groupedRows.filter(gr => (statusVal==='ALL'||gr.branchStatus===statusVal) && (branchVal==='ALL'||gr.branch===branchVal));
  const missingCount = scopeForTodo.filter(gr => dnState(gr)==='Missing').length;
  if(missingCount===0){
    todoBar.classList.add('clear');
    todoCount.textContent='0';
    todoText.innerHTML = 'All delivery notes uploaded ✓';
  } else {
    todoBar.classList.remove('clear');
    todoCount.textContent = missingCount;
    todoText.innerHTML = `delivery note${missingCount===1?'':'s'} still <b>missing</b>`;
  }

  if(!filtered.length){ branchList.innerHTML = '<div class="empty">No matching rows.</div>'; return; }

  const byBranch = {};
  const branchOrder = [];
  filtered.forEach(gr => {
    if(!byBranch[gr.branch]){ byBranch[gr.branch]=[]; branchOrder.push(gr.branch); }
    byBranch[gr.branch].push(gr);
  });

  branchList.innerHTML = '';
  branchOrder.forEach(branch => {
    const rows = byBranch[branch];
    const missing = rows.filter(r=>dnState(r)==='Missing').length;
    const isOpen = openBranches.has(branch);
    const card = document.createElement('div');
    card.className = 'branch-card';
    card.innerHTML = `
      <div class="branch-pill-head" data-branch="${branch}">
        <div class="branch-left">
          <span class="branch-code">${branch}</span>
          <span class="status-chip status-${rows[0].branchStatus}">${rows[0].branchStatus||'—'}</span>
          ${missing>0 ? `<span class="pill pill-missing">${missing} missing</span>` : `<span class="pill pill-done">✓ all uploaded</span>`}
        </div>
        <span class="chevron" style="transform:rotate(${isOpen?'0deg':'-90deg'})">▼</span>
      </div>
      <div class="branch-body" style="display:${isOpen?'block':'none'};padding:0 1.1rem 1rem;">
        <table>
          <thead><tr><th>Asset Group</th><th>D.N. Not Signed</th><th>D.N. Signed</th></tr></thead>
          <tbody>
            ${rows.map(r=>{
              const gIdx = groupedRows.indexOf(r);
              const nsHtml = r.dnNotSigned
                ? `<div class="dn-cell"><a class="dn-link" href="${r.dnNotSigned}" target="_blank">View D.N.</a><button class="dn-edit-btn" data-gidx="${gIdx}" data-action="upload">✎</button></div>`
                : `<div class="dn-cell"><button class="dn-add-btn" data-gidx="${gIdx}" data-action="upload">+ Add</button></div>`;
              const sHtml = r.dnSigned
                ? `<div class="dn-cell"><a class="dn-link" href="${r.dnSigned}" target="_blank">View Signed</a></div>`
                : `<span class="dn-none">None</span>`;
              return `<tr><td><span class="asset-pill">${r.group}</span></td><td>${nsHtml}</td><td>${sHtml}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    branchList.appendChild(card);
  });
}

branchList.addEventListener('click', (e) => {
  const head = e.target.closest('.branch-pill-head');
  if(head && !e.target.closest('[data-action]')){
    const b = head.dataset.branch;
    if(openBranches.has(b)) openBranches.delete(b); else openBranches.add(b);
    render();
    return;
  }
  const target = e.target.closest('[data-action="upload"]');
  if(!target) return;
  pendingGroupIdx = parseInt(target.dataset.gidx, 10);
  hiddenFile.value = '';
  hiddenFile.click();
});

statusFilter.onchange = render;
branchFilter.onchange = render;
dnStatusFilter.onchange = render;
assetFilter.onchange = render;
document.getElementById('refreshBtn').onclick = loadAll;

function toBase64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

hiddenFile.onchange = async () => {
  const file = hiddenFile.files[0];
  if(!file || pendingGroupIdx === null) return;
  const gr = groupedRows[pendingGroupIdx];
  const checklistRow = checklist[gr.repIdx];
  const branch = gr.branch;
  const asset = (checklistRow['Asset']||'').trim(); // actual asset name behind the group
  try{
    const base64 = await toBase64(file);
    await postAction({
      action: 'uploadDN',
      sheet: TRACKER_SHEET,
      branch, asset,
      field: 'D.N. Not Signed',
      fileName: file.name,
      mimeType: file.type || 'application/octet-stream',
      fileData: base64,
      user: 'Kamal',
      timestamp: new Date().toLocaleString('en-GB')
    });
    showToast(`Uploaded for ${branch} / ${gr.group} — saving…`);
    await new Promise(res => setTimeout(res, 2000));
    await loadAll();
  }catch(err){
    showToast('Upload failed: ' + err.message, true);
  }
};

manualSubmit.onclick = async () => {
  const branch = manualBranch.value.trim().toUpperCase();
  const asset = manualAsset.value.trim();
  if(!branch || !asset){ showToast('Enter both branch and asset.', true); return; }
  manualSubmit.disabled = true; manualSubmit.textContent = 'Adding…';
  try{
    const existing = checklist.find(r=>(r['Branch Code']||'').trim()===branch);
    const existingStatus = existing ? (existing['Branch Status']||'Receiving') : 'Receiving';
    await postAction({
      action: 'addManualAsset',
      sheet: TRACKER_SHEET,
      branch, asset,
      branchStatus: existingStatus,
      user: 'Kamal',
      timestamp: new Date().toLocaleString('en-GB')
    });
    manualBranch.value=''; manualAsset.value='';
    manualPanel.classList.remove('show');
    showToast('Row added — saving…');
    await new Promise(res => setTimeout(res, 2000));
    await loadAll();
  }catch(e){
    showToast('Could not add row: ' + e.message, true);
  }
  manualSubmit.disabled = false; manualSubmit.textContent = 'Add row';
};

loadAll();
setInterval(loadAll, 5 * 60 * 1000); // refresh every 5 minutes
</script>
</body>
</html>
